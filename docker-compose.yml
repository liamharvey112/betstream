version: '3.8'

services:
  scylla:
    image: scylladb/scylla:latest
    container_name: betstream-scylla
    ports:
      - "9042:9042"
    command: --smp 1 --memory 750M --developer-mode=1
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - scylla_data:/var/lib/scylla

  redis:
    image: redis:7-alpine
    container_name: betstream-redis
    ports:
      - "6379:6379"

  # Optional: Add frontend service later
  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "5173:5173"
  #   depends_on:
  #     - api    

volumes:
  scylla_data: